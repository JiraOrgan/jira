spring:
  datasource:
    # 로컬 개발: H2 (MySQL 호환 모드). 운영은 application-prod.yml + MySQL.
    url: jdbc:h2:mem:mng_dev;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
    hikari:
      maximum-pool-size: 5

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  data:
    redis:
      host: localhost
      port: 6379
      password: ${REDIS_PASSWORD:}

# JWT
jwt:
  secret: ${JWT_SECRET:dev-secret-key-must-be-at-least-32-characters-long}
  access-expiration: 3600000
  refresh-expiration: 604800000

# Swagger
springdoc:
  swagger-ui:
    enabled: true
  api-docs:
    enabled: true

# 개발 로깅
logging:
  level:
    com.pch.mng: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql: TRACE
