spring:
  datasource:
    url: jdbc:mysql://localhost:3306/${DB_NAME:mng_dev}?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 5

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379
      password: ${REDIS_PASSWORD:}

# JWT
jwt:
  secret: ${JWT_SECRET:dev-secret-key-must-be-at-least-32-characters-long}
  access-expiration: 3600000
  refresh-expiration: 604800000

# Swagger
springdoc:
  swagger-ui:
    enabled: true
  api-docs:
    enabled: true

# 개발 로깅
logging:
  level:
    com.jira.mng: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql: TRACE
