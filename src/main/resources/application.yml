spring:
  application:
    name: mng

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # Virtual Threads (Java 21)
  threads:
    virtual:
      enabled: true

  # Flyway
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # JPA 공통
  jpa:
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        default_batch_fetch_size: 100

  # Jackson 3.x (Spring Boot 4)
  jackson:
    time-zone: Asia/Seoul

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: when-authorized

# 공통 로깅
logging:
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

# Swagger
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
