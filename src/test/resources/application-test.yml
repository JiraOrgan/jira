spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379

jwt:
  secret: test-secret-key-must-be-at-least-32-characters-long
  access-expiration: 3600000
  refresh-expiration: 604800000

logging:
  level:
    com.pch.mng: DEBUG

app:
  board:
    cache:
      enabled: false
  notification:
    enabled: false
  integration:
    crypto:
      secret: test-integration-crypto-secret-min-32-characters-long
  github:
    public-base-url: http://localhost:8080
    oauth:
      client-id: test-github-client-id
      client-secret: test-github-client-secret
      state-hmac-secret: test-state-hmac-secret-32chars-minimum__
      redirect-uri: http://localhost:8080/api/v1/integrations/github/callback
      frontend-redirect-base: http://localhost:5173
  storage:
    type: local
    local:
      base-path: ./build/test-attachments
