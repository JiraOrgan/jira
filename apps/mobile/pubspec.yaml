name: pch_mobile
description: Project Control Hub Flutter app (Riverpod, Dio)
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.10.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.3.1
  dio: ^5.8.0+1
  shared_preferences: ^2.3.3
  # kDebugMode에서만 인터셉터 등록(api_client). 번들에 포함되나 릴리즈에서 로그 미출력.
  pretty_dio_logger: ^1.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  riverpod_lint: ^3.1.3

flutter:
  uses-material-design: true
